services:
  nd-webui:
    build: .
    image: webnd
    container_name: webnd
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      GMAP_JOBS_URL: ${GMAP_JOBS_URL:-https://neb.pwbf.pw:8585}
      GMAP_JOBS_USER: ${GMAP_JOBS_USER:-admin}
      GMAP_JOBS_PASSWORD: ${GMAP_JOBS_PASSWORD:-}
      GMAP_LOCAL_TOOL_DIR: ${GMAP_LOCAL_TOOL_DIR:-/usr/src/app/GMapLink2KML}
      GMAP_LOCAL_PYTHON: ${GMAP_LOCAL_PYTHON:-python3}
      GMAP_LOCAL_TIMEOUT_MS: ${GMAP_LOCAL_TIMEOUT_MS:-180000}
      MAX_KML_UPLOAD_BYTES: ${MAX_KML_UPLOAD_BYTES:-10485760}
      ROUTE_KML_RETENTION_HOURS: ${ROUTE_KML_RETENTION_HOURS:-24}
      ROUTE_KML_CLEANUP_INTERVAL_MS: ${ROUTE_KML_CLEANUP_INTERVAL_MS:-3600000}
    restart: unless-stopped
    volumes:
      - ./public:/usr/src/app/public:ro
      - ./data:/usr/src/app/data
