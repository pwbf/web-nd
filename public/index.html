<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navigation Display (ND)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="instrument" aria-label="Airbus-style navigation display">
      <canvas id="ndCanvas" width="960" height="960"></canvas>

      <div class="readout top-left" aria-hidden="true">
        <div class="speed-row">
          <span>GS</span><strong id="gsReadout">0</strong>
          <span>TAS</span><strong id="tasReadout">---</strong>
        </div>
        <div class="wind-row">
          <div class="wind-values">
            <strong id="windDirectionReadoutTop">000</strong><span>/</span><strong id="windSpeedReadoutTop">0</strong>
          </div>
          <i id="windArrow" class="wind-arrow"></i>
        </div>
      </div>
      <div class="readout top-right" aria-hidden="true">
        <strong id="headingReadout">257</strong>
        <span class="distance-line"><strong id="nextDistanceReadout">1</strong><em id="distanceUnitReadout">NM</em></span>
        <strong id="etaReadout">00:00</strong>
      </div>

      <div class="radios bottom-left" aria-hidden="true">
        <svg class="radio-symbol vor2-symbol" viewBox="-24 -56 48 180" aria-hidden="true">
          <path d="M 0 -40 L 0 -10 M 0 -10 L -20 30 L 20 30 Z M 0 30 L 0 80" />
        </svg>
        <div class="radio-text">
          <span>VOR1</span>
          <strong id="vor1Name">---</strong>
          <em><b id="vor1DistValue">0.38</b><i id="vor1DistUnit">NM</i></em>
        </div>
      </div>
      <div class="ta-only" id="trafficStatus" aria-hidden="true">TA ONLY</div>
      <div class="radios bottom-right" aria-hidden="true">
        <div class="radio-text">
          <span>VOR2</span>
          <strong id="vor2Name">---</strong>
          <em><b id="vor2DistValue">---</b><i id="vor2DistUnit">NM</i></em>
        </div>
        <svg class="radio-symbol vor1-symbol" viewBox="-24 -50 48 200" aria-hidden="true">
          <path d="M 0 -35 L 0 35 L -20 70 L -10 70 L -10 100" />
          <path d="M 0 -35 L 0 35 L 20 70 L 10 70 L 10 100" />
        </svg>
      </div>
    </section>

    <aside class="controls" aria-label="Navigation display controls">
      <div class="controls-header">
        <strong>Controls</strong>
        <button type="button" id="controlsToggle" aria-expanded="true">Hide</button>
      </div>
      <div class="controls-body" id="controlsBody">
        <div class="control-row">
          <label for="profileControl">KML Profile</label>
          <select id="profileControl"></select>
        </div>
        <div class="control-row">
          <label for="rangeControl">Range</label>
          <select id="rangeControl">
            <option value="0.5">0.5 NM</option>
            <option value="1">1 NM</option>
            <option value="10" selected>10 NM</option>
            <option value="20">20 NM</option>
            <option value="40">40 NM</option>
            <option value="80">80 NM</option>
            <option value="160">160 NM</option>
            <option value="320">320 NM</option>
          </select>
        </div>
        <div class="control-row">
          <label for="unitControl">Units</label>
          <select id="unitControl">
            <option value="NM" selected>NM (Nautical Miles)</option>
            <option value="m">m (meters)</option>
          </select>
        </div>
        <div class="control-row">
          <label for="headingControl">Heading</label>
          <input id="headingControl" type="range" min="0" max="359" value="257" />
        </div>
        <div class="control-row">
          <label for="latitudeControl">Latitude</label>
          <input id="latitudeControl" type="number" step="0.000001" value="35.765278" />
        </div>
        <div class="control-row">
          <label for="longitudeControl">Longitude</label>
          <input id="longitudeControl" type="number" step="0.000001" value="140.385556" />
        </div>
        <div class="control-row" id="progressControlRow">
          <label for="progressControl">Route Progress</label>
          <input id="progressControl" type="range" min="0" max="1000" value="0" />
          <output id="progressReadout" for="progressControl">0%</output>
        </div>
        <div class="control-row" id="trueAirSpeedControlRow">
          <label for="trueAirSpeedControl">True Air Speed</label>
          <input id="trueAirSpeedControl" type="range" min="0" max="500" step="1" value="250" />
          <output id="trueAirSpeedReadout" for="trueAirSpeedControl">250 NM/H</output>
        </div>
        <div class="control-row">
          <label for="windSpeedControl">Wind Speed</label>
          <input id="windSpeedControl" type="range" min="0" max="200" step="1" value="0" />
          <output id="windSpeedReadout" for="windSpeedControl">0 NM/H</output>
        </div>
        <div class="control-row">
          <label for="windDirectionControl">Wind Direction</label>
          <input id="windDirectionControl" type="range" min="0" max="359" step="1" value="0" />
          <output id="windDirectionReadout" for="windDirectionControl">000°</output>
        </div>
        <div class="control-row">
          <label for="trafficControl">Traffic</label>
          <select id="trafficControl">
            <option value="HIDDEN" selected>Hidden</option>
            <option value="TA ONLY">TA Only</option>
            <option value="TA/RA">TA/RA</option>
          </select>
        </div>
        <div class="segmented" role="group" aria-label="ND mode">
          <button type="button" class="active" data-mode="ARC">ARC</button>
          <button type="button" data-mode="ROSE">ROSE</button>
          <button type="button" data-mode="PLAN">PLAN</button>
        </div>
        <div class="control-actions">
          <button type="button" id="locationButton">Use GPS</button>
          <button type="button" id="playButton">Play</button>
          <button type="button" id="recenterButton">Reset</button>
        </div>
        <label class="check-row" for="fakeHeadingControl">
          <input id="fakeHeadingControl" type="checkbox" />
          <span>Fake Heading</span>
        </label>
        <details class="debug-panel">
          <summary>Debug</summary>
          <pre id="debugLog" class="debug-log" aria-live="polite"></pre>
        </details>
      </div>
    </aside>
  </main>
  <script src="app.js"></script>
</body>
</html>
